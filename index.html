<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simple Page</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      line-height: 1.6;
      color: #222;
      background: #f7f7f7;
    }

    main {
      max-width: 720px;
      margin: 80px auto;
      padding: 0 24px;
    }

    h1 {
      margin-bottom: 16px;
      font-size: 2rem;
    }

    p {
      margin: 0;
    }
  </style>
</head>
<body>
  <main>
    <h1>こんにちは</h1>
    <p>これはシンプルなHTMLページです。</p>
  </main>
</body>
</html>
